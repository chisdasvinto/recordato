<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Recordato — Para que no se te olvide nada. Anota con voz o texto.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recordato">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-startup-image" href="icons/icon-512.png">
  <title>Recordato</title>
  <style>
    /* Solo estilos críticos que no pueden ser inline */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      height: 100vh;
      height: 100dvh;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    }
    .oculto { display: none !important; }
    #debug-panel {
      margin-top: 8px;
      border-top: 1px solid #2a2a4a;
      padding: 8px 0;
      font-size: 0.7rem;
      color: #a0a0b0;
    }
    #debug-log {
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 0.65rem;
      background: #0d1117;
      padding: 8px;
      border-radius: 8px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div id="banner-error" style="display:none;background:#e74c3c;color:#fff;text-align:center;padding:12px 16px;font-weight:700;font-size:0.9rem;border-radius:0 0 16px 16px;word-break:break-word">
    <span id="banner-error-texto"></span>
  </div>

  <div id="banner-urgente" class="oculto" style="background:#e74c3c;color:#fff;text-align:center;padding:12px 16px;font-weight:700;font-size:1rem;border-radius:0 0 16px 16px">
    <span id="banner-texto">⚠️ Tienes recordatorios urgentes pendientes</span>
  </div>

  <header style="text-align:center;padding:20px 0 12px">
    <h1 style="font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;margin:0">📌 Recordato</h1>
    <span style="font-size:0.85rem;color:#a0a0b0">Para que no se te olvide nada</span>
  </header>

  <main style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0 20px">
    <button id="btn-voz" style="width:100%;max-width:320px;height:0;padding-bottom:min(100%,320px);position:relative;border-radius:50%;border:4px solid #4a90d9;background:#16213e;color:#e0e0e0;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,0.4);-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;overflow:hidden" aria-label="Toca y habla">
      <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">
        <span id="btn-voz-icono" style="font-size:3.5rem;line-height:1">🎤</span>
        <span id="btn-voz-texto" style="font-size:1.1rem;font-weight:700;letter-spacing:2px">TOCA Y HABLA</span>
        <span style="font-size:0.7rem;color:#a0a0b0">(toca para grabar, toca para parar)</span>
      </div>
    </button>

    <div id="grabando-indicador" class="oculto" style="display:none;align-items:center;gap:10px;font-weight:600;color:#e74c3c;font-size:0.95rem">
      <span style="width:12px;height:12px;border-radius:50%;background:#e74c3c;display:inline-block"></span>
      <span>Grabando...</span>
      <span id="transcripcion-vivo" style="color:#a0a0b0;font-style:italic;font-weight:400;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    </div>

    <button id="toggle-urgente" style="display:flex;align-items:center;gap:8px;background:#2a2a4a;border:none;border-radius:14px;padding:8px 16px;color:#e0e0e0;font-size:1rem;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;width:auto">
      <span id="toggle-icono" style="font-size:1.2rem">⚠️</span>
      <span id="toggle-texto">Urgente: NO</span>
    </button>

    <div style="width:100%;display:flex;gap:8px">
      <textarea id="input-texto" placeholder="...o escribe aquí y pulsa Enter" rows="2" maxlength="500" style="flex:1;background:#16213e;border:2px solid #2a2a4a;border-radius:16px;color:#e0e0e0;padding:12px 16px;font-size:1rem;font-family:inherit;resize:none;outline:none"></textarea>
      <button id="btn-texto" style="background:#4a90d9;color:#fff;border:none;border-radius:16px;padding:12px 20px;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap">✏️ Guardar</button>
    </div>
  </main>

  <section id="lista-notas" style="min-height:400px;overflow-y:auto;padding-bottom:16px;display:block">
    <h2 id="titulo-lista" style="font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;color:#a0a0b0;margin-bottom:10px;padding-left:4px">Tus recordatorios</h2>
    <div id="contenedor-notas" style="display:flex;flex-direction:column;gap:10px">
    </div>
    <div id="vacio-state" style="text-align:center;padding:40px 20px;color:#a0a0b0">
      <span style="font-size:3rem;display:block;margin-bottom:12px">📋</span>
      <p style="font-size:0.95rem;line-height:1.5">No hay nada apuntado todavía.<br>¡Toca el micrófono y habla!</p>
    </div>
  </section>

  <details id="debug-panel">
    <summary>🔍 Diagnóstico</summary>
    <pre id="debug-log"></pre>
  </details>

  <footer style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid #2a2a4a">
    <button id="btn-instalar" class="oculto" style="background:#4a90d9;color:#fff;border:none;font-size:0.85rem;font-weight:700;cursor:pointer;padding:8px 16px;border-radius:20px">📲 Instalar app</button>
    <button id="btn-papelera" style="background:none;border:none;color:#a0a0b0;font-size:0.85rem;cursor:pointer;padding:6px 12px;border-radius:8px">🗑️ Ver completadas</button>
    <span style="font-size:0.7rem;color:#a0a0b0">v3.0</span>
  </footer>

  <script>
    // ─── TOGGLE URGENTE (primero, antes de todo) ────────────────
    var urgenteActivo = false;
    var toggleBtn = document.getElementById('toggle-urgente');
    var toggleIcono = document.getElementById('toggle-icono');
    var toggleTexto = document.getElementById('toggle-texto');

    function actualizarToggleUI() {
      if (urgenteActivo) {
        toggleBtn.style.background = '#e74c3c';
        toggleIcono.textContent = '🔴';
        toggleTexto.textContent = 'Urgente: SÍ';
      } else {
        toggleBtn.style.background = '#2a2a4a';
        toggleIcono.textContent = '⚠️';
        toggleTexto.textContent = 'Urgente: NO';
      }
    }

    toggleBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      urgenteActivo = !urgenteActivo;
      actualizarToggleUI();
      // Escribir directamente en el DOM para confirmar
      var dbg = document.getElementById('debug-log');
      if (dbg) dbg.textContent += '🔴 TOGGLE CLICK: ' + (urgenteActivo ? 'SÍ' : 'NO') + '\n';
    });

    // También touchstart para Safari
    toggleBtn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      urgenteActivo = !urgenteActivo;
      actualizarToggleUI();
    }, {passive: false});

    window.urgenteActivo = function() { return urgenteActivo; };
    window.resetUrgente = function() {
      urgenteActivo = false;
      actualizarToggleUI();
    };

    // ─── DIAGNÓSTICO INLINE + SW KILLER ────────────────────────
    var logEl = document.getElementById('debug-log');
    function dlog(msg) {
      console.log('[DIAG]', msg);
      if (logEl) logEl.textContent += msg + '\n';
    }
    dlog('=== v3.0 DIAGNÓSTICO ===');
    dlog('UA: ' + navigator.userAgent.slice(0, 80));
    dlog('Toggle elements: btn=' + (toggleBtn ? 'OK' : 'NULL') + ' icono=' + (toggleIcono ? 'OK' : 'NULL') + ' texto=' + (toggleTexto ? 'OK' : 'NULL'));

    // MATAR Service Worker agresivamente
    if ('serviceWorker' in navigator) {
      dlog('SW API: disponible — des-registrando TODO');
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        dlog('SW encontrados: ' + regs.length);
        regs.forEach(function(r) {
          r.unregister().then(function() {
            dlog('  ✅ SW eliminado: ' + r.scope);
          });
        });
        // También limpiar cachés
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            dlog('Caches: ' + keys.length);
            keys.forEach(function(k) {
              caches.delete(k).then(function() {
                dlog('  ✅ Cache eliminado: ' + k);
              });
            });
          });
        }
      });
    }

    // Cargar app.js con cache-buster
    dlog('Cargando app.js...');

    // Toggle urgente: botón simple (Safari no falla con <button>)
    var urgenteActivo = false;
    var toggleBtn = document.getElementById('toggle-urgente');
    var toggleIcono = document.getElementById('toggle-icono');
    var toggleTexto = document.getElementById('toggle-texto');
    toggleBtn.addEventListener('click', function(e) {
      e.preventDefault();
      urgenteActivo = !urgenteActivo;
      if (urgenteActivo) {
        toggleBtn.style.background = '#e74c3c';
        toggleIcono.textContent = '🔴';
        toggleTexto.textContent = 'Urgente: SÍ';
      } else {
        toggleBtn.style.background = '#2a2a4a';
        toggleIcono.textContent = '⚠️';
        toggleTexto.textContent = 'Urgente: NO';
      }
      dlog('Toggle urgente: ' + (urgenteActivo ? 'SÍ' : 'NO'));
    });
    window.urgenteActivo = function() { return urgenteActivo; };
    window.resetUrgente = function() {
      urgenteActivo = false;
      toggleBtn.style.background = '#2a2a4a';
      toggleIcono.textContent = '⚠️';
      toggleTexto.textContent = 'Urgente: NO';
    };
    var s = document.createElement('script');
    s.src = 'app.js?v=' + Date.now();
    s.onload = function() {
      dlog('✅ app.js cargado');
      // Inspeccionar DOM después de 3 segundos
      setTimeout(function() {
        dlog('--- INSPECCIÓN POST-RENDER (3s) ---');
        var cont = document.getElementById('contenedor-notas');
        var lista = document.getElementById('lista-notas');
        dlog('contenedor-notas:');
        dlog('  hijos: ' + cont.children.length);
        dlog('  innerHTML length: ' + cont.innerHTML.length);
        dlog('  offsetHeight: ' + cont.offsetHeight + 'px');
        dlog('  offsetWidth: ' + cont.offsetWidth + 'px');
        dlog('  display: ' + getComputedStyle(cont).display);
        dlog('  visibility: ' + getComputedStyle(cont).visibility);
        dlog('  opacity: ' + getComputedStyle(cont).opacity);
        dlog('lista-notas:');
        dlog('  offsetHeight: ' + lista.offsetHeight + 'px');
        dlog('  overflow: ' + getComputedStyle(lista).overflowY);
        if (cont.children.length > 0) {
          var first = cont.children[0];
          dlog('Primera card:');
          dlog('  tagName: ' + first.tagName);
          dlog('  offsetHeight: ' + first.offsetHeight + 'px');
          dlog('  offsetWidth: ' + first.offsetWidth + 'px');
          dlog('  display: ' + getComputedStyle(first).display);
          dlog('  visibility: ' + getComputedStyle(first).visibility);
          dlog('  opacity: ' + getComputedStyle(first).opacity);
          dlog('  background: ' + getComputedStyle(first).backgroundColor);
          dlog('  textContent: ' + (first.textContent || '').slice(0, 40));
          // Verificar ancestros
          var p = first.parentElement;
          while (p) {
            var cs = getComputedStyle(p);
            if (cs.display === 'none' || cs.visibility === 'hidden' || parseFloat(cs.opacity) === 0 || cs.overflow === 'hidden' && p.offsetHeight === 0) {
              dlog('  ⚠️ ANCESTRO PROBLEMÁTICO: ' + p.tagName + (p.id ? '#'+p.id : '') + ' display=' + cs.display + ' visibility=' + cs.visibility + ' opacity=' + cs.opacity + ' overflow=' + cs.overflow + ' height=' + p.offsetHeight);
            }
            p = p.parentElement;
          }
        }
      }, 3000);
    };
    s.onerror = function() {
      dlog('❌ ERROR al cargar app.js');
    };
    document.head.appendChild(s);
  </script>
</body>
</html>
