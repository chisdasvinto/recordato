<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Recordato — Para que no se te olvide nada. Anota con voz o texto.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recordato">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-startup-image" href="icons/icon-512.png">
  <title>Recordato</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== BANNER DE URGENTES ===== -->
  <div id="banner-urgente" class="banner-urgente oculto">
    <span id="banner-texto">⚠️ Tienes recordatorios urgentes pendientes</span>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <h1 class="logo">📌 Recordato</h1>
    <span class="subtitulo">Para que no se te olvide nada</span>
  </header>

  <!-- ===== ZONA DE CAPTURA ===== -->
  <main class="captura">
    <!-- Botón de voz gigante -->
    <button id="btn-voz" class="btn-voz" aria-label="Toca y habla">
      <div class="btn-voz-inner">
        <span class="btn-voz-icono">🎤</span>
        <span class="btn-voz-texto">TOCA Y HABLA</span>
        <span class="btn-voz-hint">(toca para grabar, toca para parar)</span>
      </div>
    </button>

    <!-- Indicador de grabación -->
    <div id="grabando-indicador" class="grabando-indicador oculto">
      <span class="pulso"></span>
      <span>Grabando...</span>
      <span id="transcripcion-vivo" class="transcripcion-vivo"></span>
    </div>

    <!-- Toggle urgente -->
    <label class="toggle-urgente">
      <input type="checkbox" id="check-urgente">
      <span class="toggle-slider"></span>
      <span class="toggle-label">⚠️ ¿Urgente?</span>
    </label>

    <!-- Campo de texto alternativo -->
    <div class="modo-texto">
      <textarea id="input-texto" class="input-texto" placeholder="...o escribe aquí y pulsa Enter" rows="2" maxlength="500"></textarea>
      <button id="btn-texto" class="btn-texto" aria-label="Guardar texto">✏️ Guardar</button>
    </div>
  </main>

  <!-- ===== LISTA DE NOTAS ===== -->
  <section class="lista-notas">
    <h2 id="titulo-lista" class="titulo-lista">Tus recordatorios</h2>
    <div id="contenedor-notas" class="contenedor-notas">
      <!-- Las notas se renderizan aquí dinámicamente -->
    </div>
    <div id="vacio-state" class="vacio-state">
      <span class="vacio-icono">📋</span>
      <p>No hay nada apuntado todavía.<br>¡Toca el micrófono y habla!</p>
    </div>
  </section>

  <!-- ===== DIAGNÓSTICO (debug) ===== -->
  <details id="debug-panel" class="debug-panel">
    <summary>🔍 Diagnóstico</summary>
    <pre id="debug-log" class="debug-log"></pre>
  </details>

  <!-- ===== PIE ===== -->
  <footer class="footer">
    <button id="btn-instalar" class="btn-instalar oculto">📲 Instalar app</button>
    <button id="btn-papelera" class="btn-papelera">🗑️ Ver completadas</button>
    <span class="version">v2.0</span>
  </footer>

  <script>
    // ─── DIAGNÓSTICO INLINE (no depende de app.js) ───────────────
    var logEl = document.getElementById('debug-log');
    function dlog(msg) {
      console.log('[DIAG]', msg);
      if (logEl) logEl.textContent += msg + '\n';
    }
    dlog('=== DIAGNÓSTICO INLINE ===');
    dlog('UserAgent: ' + navigator.userAgent.slice(0, 80));
    dlog('Platform: ' + navigator.platform);
    dlog('Vendor: ' + navigator.vendor);

    // 1. ¿Service Worker bloqueando?
    if ('serviceWorker' in navigator) {
      dlog('SW API: disponible');
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        dlog('SW registrados: ' + regs.length);
        regs.forEach(function(r) {
          dlog('  SW scope: ' + r.scope + ' state: ' + (r.active ? r.active.state : 'none'));
          // Des-registrar para limpiar
          r.unregister().then(function() {
            dlog('  SW des-registrado: ' + r.scope);
          });
        });
      }).catch(function(e) {
        dlog('ERROR obteniendo SW: ' + e.message);
      });
    } else {
      dlog('SW API: NO disponible');
    }

    // 2. ¿IndexedDB funciona?
    if ('indexedDB' in window) {
      dlog('IndexedDB: disponible');
      try {
        var req = indexedDB.open('recordato-test', 1);
        req.onsuccess = function() {
          dlog('IndexedDB test: OK (abrió correctamente)');
          req.result.close();
          indexedDB.deleteDatabase('recordato-test');
        };
        req.onerror = function(e) {
          dlog('IndexedDB test ERROR: ' + e.target.error.message);
        };
        req.onupgradeneeded = function(e) {
          var db = e.target.result;
          db.createObjectStore('test', { keyPath: 'id' });
          dlog('IndexedDB upgrade: OK');
        };
      } catch(e) {
        dlog('IndexedDB EXCEPCIÓN: ' + e.message);
      }
    } else {
      dlog('IndexedDB: NO disponible');
    }

    // 3. ¿MediaRecorder?
    if ('MediaRecorder' in window) {
      dlog('MediaRecorder: disponible');
      dlog('  isTypeSupported(webm): ' + MediaRecorder.isTypeSupported('audio/webm'));
      dlog('  isTypeSupported(mp4): ' + MediaRecorder.isTypeSupported('audio/mp4'));
    } else {
      dlog('MediaRecorder: NO disponible');
    }

    // 4. Intentar cargar app.js manualmente
    dlog('Intentando cargar app.js...');
    var script = document.createElement('script');
    script.src = 'app.js?v=' + Date.now();
    script.onload = function() {
      dlog('app.js CARGADO correctamente ✅');
    };
    script.onerror = function(e) {
      dlog('app.js ERROR al cargar ❌');
      // Intentar fetch directo para ver si el archivo existe
      fetch('app.js?v=' + Date.now())
        .then(function(r) {
          dlog('  fetch app.js: status=' + r.status + ' size=' + r.headers.get('content-length'));
          return r.text();
        })
        .then(function(txt) {
          dlog('  fetch app.js: ' + txt.length + ' bytes recibidos');
          dlog('  primeras líneas: ' + txt.slice(0, 100));
        })
        .catch(function(e2) {
          dlog('  fetch app.js ERROR: ' + e2.message);
        });
    };
    document.head.appendChild(script);
  </script>
</body>
</html>
